    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%238a6fb0'/%3E%3C/svg%3E">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg1: #c7b3e0;
            --bg2: #b3e0c7;
            --text: #333;
            --title: #4a3a60;
            --subtitle: #5a7a60;
            --card-bg: rgba(255, 255, 255, 0.18);
            --card-border: rgba(255, 255, 255, 0.35);
        }
        body.dark {
            --bg1: #1b1830;
            --bg2: #0d0d14;
            --text: #eee;
            --title: #C9BCF1;
            --subtitle: #9b8fc7;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
        }

        body {
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease infinite;
            color: var(--text);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
            transition: background 0.4s ease, color 0.4s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particules flottantes en fond */
        #particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            bottom: -10px;
            background: rgba(138, 111, 176, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(138, 111, 176, 0.5);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(var(--drift)); opacity: 0; }
        }

        /* Petit rond décoratif qui suit la souris, en plus du curseur normal (qui reste visible) */
        @media (hover: hover) and (pointer: fine) {
            .cursor { display: block; }
        }
        .cursor {
            display: none;
            width: 15px; height: 15px;
            border: 2px solid #8a6fb0;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
        }

        .top-bar {
            position: fixed; top: 15px; right: 15px;
            display: flex; gap: 10px; z-index: 5;
        }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(6px);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.95rem;
            transition: transform 0.2s ease;
        }
        .icon-btn:hover { transform: scale(1.1); }

        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 350px; }

        .avatar-wrap {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #8a6fb0; margin-bottom: 20px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #8a6fb0;
            animation: float 3s ease-in-out infinite;
            position: relative;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        h1 { font-size: 2rem; margin-bottom: 5px; color: var(--title); }
        .subtitle { color: var(--subtitle); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }

        .planning-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--title); text-decoration: none; font-size: 0.85rem;
            margin-bottom: 20px; opacity: 0.85; transition: opacity 0.2s ease;
            border-bottom: 1px dashed var(--title); padding-bottom: 2px;
        }
        .planning-link:hover { opacity: 1; }

        .btn-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; color: #fff; text-decoration: none; padding: 14px; margin: 8px 0;
            border-radius: 8px; text-align: center; font-weight: bold; position: relative;
            overflow: hidden; opacity: 0; animation: fadeInDown 0.6s ease forwards;
            border: none; cursor: pointer; font-size: 1rem; font-family: inherit;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
            transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
        }
        .icon { width: 1.15rem; height: 1.15rem; fill: currentColor; flex-shrink: 0; transition: transform 0.35s ease; }
        .btn-link:hover .icon { transform: scale(1.25) rotate(-8deg); }
        .planning-link .icon { width: 0.95rem; height: 0.95rem; }
        .icon-btn .icon { width: 1rem; height: 1rem; }
        .avatar-wrap .icon { width: 3rem; height: 3rem; fill: #fff; }
        .chevron { width: 0.9rem; height: 0.9rem; transition: transform 0.3s ease; }
        .tiktok-toggle.open .chevron { transform: rotate(180deg); }
        .copy-link-btn .icon { width: 0.95rem; height: 0.95rem; }

        /* Couleurs officielles en version glassmorphism (fond semi-transparent + bordure) */
        .twitch     { background-color: rgba(145, 70, 255, 0.75); border: 1px solid rgba(255,255,255,0.25); }
        .patreon    { background-color: rgba(255, 66, 77, 0.75); border: 1px solid rgba(255,255,255,0.25); }
        .youtube    { background-color: rgba(255, 0, 0, 0.75); border: 1px solid rgba(255,255,255,0.25); }
        .snapchat   { background-color: rgba(255, 252, 0, 0.8); color: #000; border: 1px solid rgba(0,0,0,0.15); }
        .instagram  { background: linear-gradient(45deg, rgba(240,148,51,0.8), rgba(230,104,60,0.8), rgba(220,39,67,0.8), rgba(204,35,102,0.8), rgba(188,24,136,0.8)); border: 1px solid rgba(255,255,255,0.25); }
        .twitter    { background-color: rgba(29, 161, 242, 0.75); border: 1px solid rgba(255,255,255,0.25); }
        .tiktok-toggle { background-color: rgba(0,0,0,0.75); justify-content: space-between; padding: 14px 20px; border: 1px solid rgba(255,255,255,0.15); }

        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #ff4d4d; border-radius: 50%;
            box-shadow: 0 0 8px #ff4d4d;
            animation: liveBlink 1.2s ease-in-out infinite;
            margin-left: 4px;
        }
        @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-link:hover { transform: translateY(-4px); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }

        .btn-link:nth-of-type(1) { animation-delay: 0.1s; }
        .btn-link:nth-of-type(2) { animation-delay: 0.2s; }
        .btn-link:nth-of-type(3) { animation-delay: 0.3s; }
        .btn-link:nth-of-type(4) { animation-delay: 0.4s; }
        .btn-link:nth-of-type(5) { animation-delay: 0.5s; }
        .btn-link:nth-of-type(6) { animation-delay: 0.6s; }
        .btn-link:nth-of-type(7) { animation-delay: 0.7s; }

        /* Sous-menu TikTok */
        .tiktok-submenu {
            width: 100%;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            display: flex; flex-direction: column;
        }
        .tiktok-submenu.open { max-height: 300px; }
        .tiktok-submenu .btn-link {
            background-color: rgba(26, 26, 26, 0.75);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 0.9rem;
            padding: 12px;
            margin: 4px 0;
            opacity: 1;
            animation: none;
        }

        .copy-link-btn {
            margin-top: 20px;
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(6px);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .copy-link-btn:hover { transform: translateY(-2px); }
        .copy-link-btn.copied { background: rgba(76, 217, 100, 0.35); }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--subtitle);
            opacity: 0.7;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeInDown { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <script>
        // Curseur personnalisé (uniquement actif sur ordinateur, voir media query CSS)
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Menu déroulant TikTok
        const toggle = document.getElementById('tiktok-toggle');
        const submenu = document.getElementById('tiktok-submenu');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('open');
            submenu.classList.toggle('open');
            playClickSound();
        });

        // Particules flottantes en fond
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            particlesContainer.appendChild(p);
        }

        // Thème clair / sombre
        const themeToggle = document.getElementById('theme-toggle');
        const iconMoon = document.getElementById('theme-icon-moon');
        const iconSun = document.getElementById('theme-icon-sun');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            iconMoon.style.display = isDark ? 'none' : 'block';
            iconSun.style.display = isDark ? 'block' : 'none';
        });

        // Son léger au clic (généré, aucun fichier audio externe nécessaire)
        let soundOn = false;
        const soundToggle = document.getElementById('sound-toggle');
        const iconSoundOff = document.getElementById('sound-icon-off');
        const iconSoundOn = document.getElementById('sound-icon-on');
        soundToggle.addEventListener('click', () => {
            soundOn = !soundOn;
            iconSoundOff.style.display = soundOn ? 'none' : 'block';
            iconSoundOn.style.display = soundOn ? 'block' : 'none';
        });
        function playClickSound() {
            if (!soundOn) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 600;
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }
        document.querySelectorAll('.btn-link').forEach(btn => {
            btn.addEventListener('click', () => playClickSound());
        });

        // Copier le lien de la page
        const copyBtn = document.getElementById('copy-link-btn');
        const copyLabel = document.getElementById('copy-label');
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                copyBtn.classList.add('copied');
                copyLabel.textContent = 'Lien copié !';
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyLabel.textContent = 'Copier le lien de cette page';
                }, 2000);
            });
            playClickSound();
        });
    </script>
</body>
</html>
