<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TvAbdou - Mes Réseaux</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            /* Remplacement du vert par #C9BCF et maintien du dégradé harmonieux */
            background: linear-gradient(135deg, #c7b3e0 0%, #C9BCF 100%); 
            color: #333; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            overflow-x: hidden; 
        }

        .cursor { width: 15px; height: 15px; border: 2px solid #8a6fb0; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 350px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #8a6fb0; margin-bottom: 20px; object-fit: cover; animation: float 3s ease-in-out infinite; }

        h1 { font-size: 2rem; margin-bottom: 5px; color: #4a3a60; }
        .subtitle { color: #5a7a60; font-weight: bold; margin-bottom: 25px; }

        .btn-link { 
            display: block; width: 100%; color: #fff; text-decoration: none; padding: 14px; margin: 8px 0; 
            border-radius: 8px; text-align: center; font-weight: bold; position: relative; 
            overflow: hidden; opacity: 0; animation: fadeInDown 0.6s ease forwards;
        }

        /* Couleurs officielles */
        .twitch { background-color: #9146ff; }
        .patreon { background-color: #ff424d; }
        .youtube { background-color: #ff0000; }
        .snapchat { background-color: #fffc00; color: #000; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .twitter { background-color: #1da1f2; }
        .tiktok { background-color: #000000; }

        .btn-link:hover { transform: translateY(-4px); filter: brightness(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .btn-link:nth-of-type(1) { animation-delay: 0.1s; }
        .btn-link:nth-of-type(2) { animation-delay: 0.2s; }
        .btn-link:nth-of-type(3) { animation-delay: 0.3s; }
        .btn-link:nth-of-type(4) { animation-delay: 0.4s; }
        .btn-link:nth-of-type(5) { animation-delay: 0.5s; }
        .btn-link:nth-of-type(6) { animation-delay: 0.6s; }
        .btn-link:nth-of-type(7) { animation-delay: 0.7s; }
        .btn-link:nth-of-type(8) { animation-delay: 0.8s; }
        .btn-link:nth-of-type(9) { animation-delay: 0.9s; }
        .btn-link:nth-of-type(10) { animation-delay: 1.0s; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeInDown { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>

    <div class="content">
        <img src="avatar.png" alt="TvAbdou" class="avatar">
        <h1>TvAbdou</h1>
        <div class="subtitle">MES RÉSEAUX</div>
        
        <a href="https://www.twitch.tv/tvabdou" class="btn-link twitch">🎮 Twitch</a>
        <a href="https://www.patreon.com/cw/TVABDOU" class="btn-link patreon">💎 Patreon</a>
        <a href="https://www.youtube.com/@hdkabdou" class="btn-link youtube">📺 YouTube</a>
        <a href="https://www.snapchat.com/@abdoubrnk" class="btn-link snapchat">👻 Snapchat</a>
        <a href="https://www.instagram.com/tvabdoupro/" class="btn-link instagram">📸 Instagram</a>
        <a href="https://x.com/Tvabdouu" class="btn-link twitter">🐦 Twitter / X</a>
        <a href="https://www.tiktok.com/@lesfilms2tvabdou" class="btn-link tiktok">🎬 TikTok Films</a>
        <a href="https://www.tiktok.com/@lesanimes2tvabdou" class="btn-link tiktok">⛩️ TikTok Animes</a>
        <a href="https://www.tiktok.com/@lesseries2tvabdou" class="btn-link tiktok">🍿 TikTok Séries</a>
        <a href="https://www.tiktok.com/@clip2abdou" class="btn-link tiktok">✂️ Clip Tiktok</a>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
