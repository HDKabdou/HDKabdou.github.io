<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Hub - Traducteur</title>
    <style>
        body {
            background-color: #0d1117; 
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .btn-link {
            display: block;
            width: 100%;
            max-width: 350px;
            background-color: #21262d;
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #30363d;
            transition: 0.3s;
        }
        .btn-link:hover {
            background-color: #58a6ff;
            transform: scale(1.03);
        }
    </style>
</head>
